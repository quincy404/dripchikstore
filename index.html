<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dripchik Store</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #f4f4f4;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      background-color: white;
      box-shadow: 0 2px 10px rgba(250, 129, 0, 0.74);
    }

    .logo {
      font-family: "Brush Script MT", cursive;
      font-size: 32px;
      color: #ff9900;
    }

    nav {
    
      display: flex;
      gap: 15px;
    }

    nav button {
      background-color: #ff7f32;
      border: none;
      color: white;
      font-weight: bold;
      font-size: 16px;
      border-radius: 20px;
      padding: 10px 20px;
      cursor: pointer;
      transition: 0.3s;
    }

    nav button:hover {
      background-color: #ff5100;
    }

    nav button.active {
      background-color: black;
      color: white;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 40px;
    }

    .card {
      border-radius: 25px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 60px;
      font-weight: bold;
    }

    .half {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }
      .overlay {
        font-size: 40px;
      }
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <button>головна сторінка </button>
      <button>Каталог</button>
    </nav>

   <div class="logo">
  <img src="D:\site\name.png" width: auto;  height: auto>
</div>

    <nav>

    
      <button>Чоловіки</button>
      <button>Жінки</button>
      <button class="active">розпродаж</button>
    </nav>
  </header>

  <main class="container">
    <div class="half">
      <div class="card">
        <img src="D:\site\shoos2025.png" alt="new sneakers">
        <div class="overlay">NEW 2025</div>
      </div>
      <a href="D:\site\chss.html" style="text-decoration: none;">
  <div class="card">
    <img src="D:\site\shossss.png" alt="кросівки">
    <div class="overlay">Кросівки</div>
  </div>
</a>

    </div>

    <div class="card">
      <img src="D:\site\closs.png" alt="одяг">
      <div class="overlay">Одяг</div>
    </div>
  </main>
</body>
</html>
